<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="loanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="300" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="450" cy="50" r="40" fill="rgba(255,255,255,0.1)"/>
  <circle cx="50" cy="250" r="60" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Main loan document icon -->
  <g transform="translate(150, 80)">
    <!-- Document -->
    <rect x="0" y="0" width="200" height="140" rx="8" fill="white" opacity="0.95"/>
    
    <!-- Header bar -->
    <rect x="0" y="0" width="200" height="30" rx="8" fill="url(#loanGradient)"/>
    <text x="100" y="22" font-size="16" font-weight="bold" fill="white" text-anchor="middle">LOAN APPLICATION</text>
    
    <!-- Content lines -->
    <rect x="15" y="50" width="170" height="3" rx="1.5" fill="rgba(30, 64, 175, 0.3)"/>
    <rect x="15" y="65" width="170" height="3" rx="1.5" fill="rgba(30, 64, 175, 0.3)"/>
    <rect x="15" y="80" width="100" height="3" rx="1.5" fill="rgba(30, 64, 175, 0.3)"/>
    
    <!-- Checkmark -->
    <circle cx="150" cy="100" r="20" fill="url(#loanGradient)"/>
    <polyline points="140,100 150,110 165,90" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text overlay -->
  <text x="250" y="240" font-size="32" font-weight="bold" fill="white" text-anchor="middle">Apply for Loan</text>
  <text x="250" y="275" font-size="18" fill="rgba(255,255,255,0.9)" text-anchor="middle">Click to Get Started</text>
  
  <!-- Arrow icon -->
  <g transform="translate(415, 240)">
    <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
    <polyline points="-8,-2 0,8 8,-2" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
